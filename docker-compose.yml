services:
  cc-analytics:
    container_name: cc-analytics
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:6767:6767"
    environment:
      CC_ANALYTICS_DB_PATH: /data/analytics.db
      PORT: "6767"
      TZ: America/New_York
    volumes:
      - cc-analytics-data:/data
    restart: unless-stopped

volumes:
  cc-analytics-data:
